<!doctype html>
<html>

<head>
    <title>我的</title>
    <meta charset="utf-8">
</head>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="./index.css">

<body style="background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 50%, #e8eaf6 100%);">
    <div id="app"
        style="display: flex;flex-wrap: wrap;background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 50%, #e8eaf6 100%);justify-content: center;padding-bottom: 12em;">
        <div class="login_box" v-if="ait" @click="ait=false;" style="font-size: 48px;">
            <div class="login_main" style="max-width: 70%;" @click.stop>
                <div class="buyalt">
                    <div class="buyalt_p_and_copy">
                        <p style="width: 100%;">订单号：{{order_id}}</p>
                        <svg @click="copyText(order_id)" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 8V6C16 4.89543 15.1046 4 14 4H6C4.89543 4 4 4.89543 4 6V14C4 15.1046 4.89543 16 6 16H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="buyalt_p_and_copy">
                        <p style="width: 100%;">客服qq号：2770419807</p>
                        <svg @click="copyText('2770419807')" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 8V6C16 4.89543 15.1046 4 14 4H6C4.89543 4 4 4.89543 4 6V14C4 15.1046 4.89543 16 6 16H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <button @click="gotoqicq" style="font-size: 48px;">点我跳转到QQ</button>
                </div>
            </div>
        </div>
        <div class="buttom_nav">
            <p @click="gotopage('index.html')">我要租号</p>
            <p style="font-weight: 600;">我的</p>
        </div>
        <div class="login_box" v-if="logining" @click="logining=!logining">
            <div class="login_main" @click.stop>
                <!-- <img src="./ass/img.png" alt=""> -->
                <div class="big">
                    <div class="login_main_test">
                        <p>邮箱登录</p>
                    </div>
                    <div class="login_maim_inputs">
                        <div class="login_maim_input">
                            <svg width="4em" height="4em" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z" />
                            </svg><input type="text" placeholder="请输入邮箱" v-model="emlie">
                        </div>
                        <div class="login_maim_input">
                            <svg width="4em" height="4em" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                            </svg><input type="text" placeholder="请输入密码" v-model="password">
                        </div>
                    </div>
                    <div class="login_login">
                        <button @click="login()">
                            <div class="loading-138" v-if="loginload"></div>
                            登录</button>
                        <button @click="register()">
                            <div class="loading-138" v-if="zhuceload"></div>
                            注册</button>
                    </div>
                    <div class="agreement">
                        <input type="checkbox" id="agree" v-model="userpesion" style="height: 40px;" />
                        <label for="agree">我已阅读并同意《用户协议》</label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="avatar" @click="logining=!logining">
            <img src="./ass/img.png" alt="头像">
            <p>{{ userpesion && userpesion.user ? userpesion.user.email : '未登录' }}</p>
        </div>
        <div class="order">
            <p>我的信用</p>
        </div>
        <div class="credit">
            <div>
                <p class="info_1">{{product.length}}单</p>
                <p class="info_2">共成交</p>
            </div>
            <div>
                <p class="info_1">100</p>
                <p class="info_2">信用分</p>
            </div>
            <div>
                <p class="info_1">0元</p>
                <p class="info_2">总计支付</p>
            </div>
        </div>
        <div class="order">
            <p>我的订单</p>
        </div>
        <div class="generalComponent" v-for="item in product" :key="item.id" v-if="userpesion&&product.length > 0">
            <div class="product" @click="gotodetail(item.id)">
                <img :src="item.image">
                <div style="flex: 1;">
                    <div>
                        <span class="info" v-for="info in item.tags" :key="info.name"
                            :style="{backgroundColor: info.color }">&nbsp;{{info.name}}&nbsp;</span>
                        <span class="title">
                            {{item.title}}
                        </span>
                    </div>
                    <div style="margin: 0.5em 0;">
                        <span class="info_gray" v-for="info in item.accountFeatures" :key="info.info">
                            {{info.info}}
                        </span>
                    </div>
                    <div>
                        <span class="info_box" v-for="info in item.accountResources" :key="info.info">
                            {{info.info}}
                        </span>
                    </div>
                    <div class="resources">
                        <div class="box" v-for="i in 4">
                            <p>资源{{i}}</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="operation">
                <button style="margin-left: auto;" @click="getOrderId(item.id)">联系号主</button>
                <button @click="unlockOrder(item.id)">取消锁定</button>
            </div>
        </div>
        <div v-if="!userpesion||product.length == 0" style="padding: 1em;width: 100%;font-size: 48px;">
            <p style="text-align: center;">无</p>
        </div>
        <div style="width: 100%; margin-top: auto;"></div>
    </div>
</body>
<script>
    const supabaseapp = window.supabase.createClient(
        'https://peyqfvxzesnyfluapilt.supabase.co',
        'sb_publishable_3RuQH5_WE9uC4k9gRCW-ng_DXW_YuMb'
    );
    new Vue({
        el: '#app',
        data: {
            product: [

            ],
            logining: false,
            emlie: null,
            password: null,
            userpesion: null,
            loginload:false,
            zhuceload:false,
            ait:false,
            order_id:null
        },
        methods: {
            async register() {
                if (!this.emlie || !this.password) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (this.emlie.length < 6) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (!this.userpesion) {
                    alert('请同意用户协议！');
                    return;
                }
                this.zhuceload=true;
                const { data, error } = await supabaseapp.auth.signUp({
                    email: this.emlie,
                    password: this.password,
                });
                this.zhuceload=false;
                if (error) {
                    alert(error);
                }
                else {
                    alert('注册成功，请前往邮箱验证！');
                }
                return;
            },
            async login(){
                if (!this.emlie || !this.password) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (this.emlie.length < 6) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (!this.userpesion) {
                    alert('请同意用户协议！');
                    return;
                }
                this.loginload=true;
                const { data, error } = await supabaseapp.auth.signInWithPassword({
                    email: this.emlie,
                    password: this.password,
                });
                this.loginload=false;
                if (error) {
                    alert('账户或密码错误！',error);
                }
                else {
                    alert('登录成功！');
                    this.logining=false;
                    this.userpesion=data;
                    localStorage.setItem('user_login', JSON.stringify(data));
                    location.reload();
                }
                return;
            },
            gotodetail(a){
                if(this.userpesion){
                    window.location.href = 'detail.html?id=' + a 
                }
                else{
                    this.logining=true
                }
            },
            gotopage(a){
                window.location.href = a 
            },
            copyText(a) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(a)
                    .then(() => alert('已复制到剪切板'))
                    .catch(() => this.fallbackCopy(a))
                } else {
                    this.fallbackCopy(a)
                }
            },
            fallbackCopy(text) {
                const input = document.createElement('input')
                input.value = text
                document.body.appendChild(input)
                input.select()
                document.execCommand('copy')
                document.body.removeChild(input)
                alert('已复制到剪切板')
            },
            gotoqicq(){
                    window.location.href = 'mqq://';
            },
            async getOrderId(productId) {
                console.log(productId)
                const { data, error } = await supabaseapp
                    .from('orders')
                    .select('orderId')
                    .eq('status', '锁定')
                    .eq('product_id', productId)
                    .single()
                console.log(data)
                this.order_id=data.orderId;
                this.ait=true;
            },
            async unlockOrder(a){
                const r = confirm('确定取消锁定该订单？你将无法对该订单执行任何操作！')
                if (r) {
                    console.log(a)
                    const { data, error } = await supabaseapp
                        .from('orders')
                        .select('orderId')
                        .eq('product_id', a)
                        .eq('status', '锁定')
                        .single()
                    console.log(data)
                    const b=data.orderId;
                    const { data: { session }, error: sessionError } = await supabaseapp.auth.getSession();
                    this.userpesion = session ? { user: session.user, session: session } : null;
                    const response = await fetch('https://peyqfvxzesnyfluapilt.supabase.co/functions/v1/hyper-function', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + this.userpesion.session.access_token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            orderId: b,
                            operator: this.userpesion.user.email
                        })
                    })
                    const result = await response.json()
                    console.log(result)
                    alert('该订单已成功取消锁定！')
                    location.reload() 
                } else {
                    return;
                }
            }
        },
        async mounted() {
            try{
                const session = JSON.parse(localStorage.getItem('user_login'));
                this.userpesion=session;
                console.log('已解析用户数据',this.userpesion)
                if(!this.userpesion){
                    console.log('用户未登录')
                }
            }
            catch{
                console.log('未登录')
            }
            if(this.userpesion){
                const { data, error } = await supabaseapp
                    .from('orders')
                    .select('*')
                    .eq('user_id', this.userpesion.user.email)
                console.log(data, error)
                this.product = data;
                let productIds=[];
                for(let i of this.product){
                    if(i.status!='未锁定'){
                        productIds.push(Number(i.product_id))
                    }
                }
                console.log(productIds)
                const { data: products } = await supabaseapp
                    .from('products')
                    .select('*')
                    .in('id', productIds)
                this.product = products;
            }
        }
    })
</script>

</html>

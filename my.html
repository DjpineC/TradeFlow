<!doctype html>
<html>

<head>
    <title>我的</title>
    <meta charset="utf-8">
</head>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="./index.css">

<body>
    <div id="app"
        style="display: flex;flex-wrap: wrap;background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 50%, #e8eaf6 100%);justify-content: center;">
        <div class="buttom_nav">
            <p @click="gotopage('index.html')">我要租号</p>
            <p style="font-weight: 600;">我的</p>
        </div>
        <div class="login_box" v-if="logining" @click="logining=!logining">
            <div class="login_main" @click.stop>
                <!-- <img src="./ass/img.png" alt=""> -->
                <div class="big">
                    <div class="login_main_test">
                        <p>邮箱登录</p>
                    </div>
                    <div class="login_maim_inputs">
                        <div class="login_maim_input">
                            <svg width="4em" height="4em" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z" />
                            </svg><input type="text" placeholder="请输入邮箱" v-model="emlie">
                        </div>
                        <div class="login_maim_input">
                            <svg width="4em" height="4em" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                            </svg><input type="text" placeholder="请输入密码" v-model="password">
                        </div>
                    </div>
                    <div class="login_login">
                        <button @click="login()">
                            <div class="loading-138" v-if="loginload"></div>
                            登录</button>
                        <button @click="register()">
                            <div class="loading-138" v-if="zhuceload"></div>
                            注册</button>
                    </div>
                    <div class="agreement">
                        <input type="checkbox" id="agree" v-model="userpesion" style="height: 40px;" />
                        <label for="agree">我已阅读并同意《用户协议》</label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="avatar" @click="logining=!logining">
            <img src="./ass/img.png" alt="头像">
            <p>{{ userpesion && userpesion.user ? userpesion.user.email : '未登录' }}</p>
        </div>
        <div class="order">
            <p>我的订单</p>
            <div v-if="userpesion&&product.length > 0">
                <div class="generalComponent" v-for="item in product" :key="item.id">
                    <div class="product" @click="gotodetail(item.id)">
                        <img :src="item.image">
                        <div style="flex: 1;">
                            <div>
                                <span class="info" v-for="info in item.tags" :key="info.name"
                                    :style="{backgroundColor: info.color }">&nbsp;{{info.name}}&nbsp;</span>
                                <span class="title">
                                    {{item.title}}
                                </span>
                            </div>
                            <div style="margin: 0.5em 0;">
                                <span class="info_gray" v-for="info in item.accountFeatures" :key="info.info">
                                    {{info.info}}
                                </span>
                            </div>
                            <div>
                                <span class="info_box" v-for="info in item.accountResources" :key="info.info">
                                    {{info.info}}
                                </span>
                            </div>
                            <div class="resources">
                                <div class="box" v-for="i in 4">
                                    <p>资源{{i}}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div v-else style="padding: 1em;width: 100%;">
                <p style="text-align: center;">无</p>
            </div>
        </div>
    </div>
</body>
<script>
    const supabaseapp = window.supabase.createClient(
        'https://peyqfvxzesnyfluapilt.supabase.co',
        'sb_publishable_3RuQH5_WE9uC4k9gRCW-ng_DXW_YuMb'
    );
    new Vue({
        el: '#app',
        data: {
            product: [

            ],
            logining: false,
            emlie: null,
            password: null,
            userpesion: null,
            loginload:false,
            zhuceload:false,
        },
        methods: {
            async register() {
                if (!this.emlie || !this.password) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (this.emlie.length < 6) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (!this.userpesion) {
                    alert('请同意用户协议！');
                    return;
                }
                this.zhuceload=true;
                const { data, error } = await supabaseapp.auth.signUp({
                    email: this.emlie,
                    password: this.password,
                });
                this.zhuceload=false;
                if (error) {
                    alert(error);
                }
                else {
                    alert('注册成功，请前往邮箱验证！');
                }
                return;
            },
            async login(){
                if (!this.emlie || !this.password) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (this.emlie.length < 6) {
                    alert('请填写完整邮箱与密码！');
                    return;
                }
                if (!this.userpesion) {
                    alert('请同意用户协议！');
                    return;
                }
                this.loginload=true;
                const { data, error } = await supabaseapp.auth.signInWithPassword({
                    email: this.emlie,
                    password: this.password,
                });
                this.loginload=false;
                if (error) {
                    alert('账户或密码错误！',error);
                }
                else {
                    alert('登录成功！');
                    this.logining=false;
                    this.userpesion=data;
                    localStorage.setItem('user_login', JSON.stringify(data));
                }
                return;
            },
            gotodetail(a){
                if(this.userpesion){
                    window.open('detail.html?id='+a)
                }
                else{
                    this.logining=true
                }
            },
            gotopage(a){
                window.open(a);
            }
        },
        async mounted() {
            try{
                const session = JSON.parse(localStorage.getItem('user_login'));
                this.userpesion=session;
                console.log('已解析用户数据',this.userpesion)
                if(!this.userpesion){
                    console.log('用户未登录')
                }
            }
            catch{
                console.log('未登录')
            }
            if(this.userpesion){
                const { data, error } = await supabaseapp
                    .from('orders')
                    .select('*')
                    .eq('user_id', this.userpesion.user.email)
                console.log(data, error)
                this.product = data;
                let productIds=[];
                for(let i of this.product){
                    productIds.push(Number(i.product_id))
                }
                console.log(productIds)
                const { data: products } = await supabaseapp
                    .from('products')
                    .select('*')
                    .in('id', productIds)
                this.product = products;
            }
        }
    })
</script>

</html>
